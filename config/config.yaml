# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 — A股金融晨报
#                      Version: 2.4.0
# ═══════════════════════════════════════════════════════════════


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false


# ===============================================================
# 1.5 调度系统 — 每日早晨金融晨报
# ===============================================================
schedule:
  enabled: true                       # 恢复正常调度：每日7:00-8:30推送
  preset: "morning_finance"


# ===============================================================
# 2. 数据源 - 热榜平台（聚焦财经）
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
    - id: "cls-hot"
      name: "财联社"
      expected_domain: "cls.cn"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"


# ===============================================================
# 3. 数据源 - RSS 订阅（X/Twitter 金融账号）
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 2

  feeds:
    # ── 国际财经 RSS（可靠源）──
    - id: "cnbc"
      name: "CNBC 财经"
      url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"

    - id: "google-finance"
      name: "Google News 商业"
      url: "https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtVnVHZ0pWVXlnQVAB"
      max_age_days: 1

    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"

    # ── 国际金融公开信息 RSS（替代X公开帖功能）──
    # 注：X/Twitter免费RSS桥已于2025-2026年全面失效（API变更）。
    # 以下RSS源覆盖同X金融账号等价的公开信息：Reuters/Bloomberg/CNBC等。
    # GitHub Actions环境可直接访问，已验证可用。

    - id: "reuters-business"
      name: "Reuters 商业"
      url: "https://feeds.reuters.com/reuters/businessNews"
      enabled: false                    # 可能被墙，GA环境按需启用

    - id: "marketwatch-top"
      name: "MarketWatch 头条"
      url: "https://feeds.marketwatch.com/marketwatch/topstories"
      enabled: false                    # 可能被墙，GA环境按需启用

    # 自定义X公开帖源（如果你有可用的RSSHub实例或代理，填入下方）
    # 格式: https://<你的rsshub域名>/twitter/user/<账号名>
    # - id: "x-custom-1"
    #   name: "X公开帖: <描述>"
    #   url: ""
    #   enabled: false


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "daily"
  display_mode: "platform"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0


# ===============================================================
# 4.5 筛选策略 — 关键词匹配（不消耗AI token）
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: false


# ===============================================================
# 4.6 AI 智能筛选配置（备用，filter.method=ai 时生效）
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.5
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - ai_analysis
    - standalone
    - hotlist
    - rss

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true
    ai_analysis: true

  standalone:
    platforms: ["cls-hot"]
    rss_feeds: []
    max_items: 0


# ===============================================================
# 6. 推送通知 — Bark
# ===============================================================
notification:
  enabled: true

  channels:
    bark:
      url: ""

    # 以下未启用
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 7

  remote:
    retention_days: 7
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 180
  temperature: 0.3
  max_tokens: 8000
  num_retries: 2
  fallback_models: []


# ===============================================================
# 9. AI 分析功能 — 金融晨报专用
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "morning_report_prompt.txt"

  mode: "daily"
  max_news_for_analysis: 200
  include_rss: true
  include_standalone: true
  include_rank_timeline: false


# ===============================================================
# 10. AI 翻译 — 关闭（中文输出不需要）
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: false
    standalone: false


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 30
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
