# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 — A股金融晨报
#                      Version: 2.4.0
# ═══════════════════════════════════════════════════════════════


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false


# ===============================================================
# 1.5 调度系统 — 每日早晨金融晨报
# ===============================================================
schedule:
  enabled: true
  preset: "morning_finance"


# ===============================================================
# 2. 数据源 - 热榜平台（聚焦财经）
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
    - id: "cls-hot"
      name: "财联社"
      expected_domain: "cls.cn"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"


# ===============================================================
# 3. 数据源 - RSS 订阅（X/Twitter 金融账号）
# ===============================================================
rss:
  enabled: true

  freshness_filter:
    enabled: true
    max_age_days: 2

  feeds:
    # ── 财联社 RSS（核心来源）──
    - id: "cls-rss"
      name: "财联社电报"
      url: "https://www.cls.cn/api/sw?app=CailianpressWeb&os=web&sv=8.4.6"
      enabled: false

    # ── X/Twitter 金融账号（通过 RSSHub）──
    # 国际财经媒体
    - id: "x-bloomberg"
      name: "Bloomberg (@business)"
      url: "https://rsshub.app/twitter/user/business"
      max_age_days: 2

    - id: "x-reuters"
      name: "Reuters (@Reuters)"
      url: "https://rsshub.app/twitter/user/Reuters"
      max_age_days: 2

    - id: "x-wsj"
      name: "WSJ (@WSJ)"
      url: "https://rsshub.app/twitter/user/WSJ"
      max_age_days: 2

    - id: "x-cnbc"
      name: "CNBC (@CNBC)"
      url: "https://rsshub.app/twitter/user/CNBC"
      max_age_days: 2

    # 中国财经
    - id: "x-caixin"
      name: "Caixin (@caixin)"
      url: "https://rsshub.app/twitter/user/caixin"
      max_age_days: 2

    - id: "x-xhnews"
      name: "Xinhua News (@XHNews)"
      url: "https://rsshub.app/twitter/user/XHNews"
      max_age_days: 2

    - id: "x-globaltimes"
      name: "Global Times (@globaltimesnews)"
      url: "https://rsshub.app/twitter/user/globaltimesnews"
      max_age_days: 2

    # 金融数据与分析
    - id: "x-sinomarket"
      name: "China Market (@Sino_Market)"
      url: "https://rsshub.app/twitter/user/Sino_Market"
      max_age_days: 2

    - id: "x-chinamacro"
      name: "China Macro (@ChinaMacro)"
      url: "https://rsshub.app/twitter/user/ChinaMacro"
      max_age_days: 2

    # 美联储与央行
    - id: "x-federalreserve"
      name: "Federal Reserve (@federalreserve)"
      url: "https://rsshub.app/twitter/user/federalreserve"
      max_age_days: 2

    # 自定义X源示例（按需取消注释）
    # - id: "x-custom"
    #   name: "自定义X账号"
    #   url: "https://rsshub.app/twitter/user/账号名"
    #   enabled: false
    #   max_age_days: 2


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "daily"
  display_mode: "platform"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0


# ===============================================================
# 4.5 筛选策略 — 关键词匹配（不消耗AI token）
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: false


# ===============================================================
# 4.6 AI 智能筛选配置（备用，filter.method=ai 时生效）
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.5
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - ai_analysis
    - standalone
    - hotlist
    - rss

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true
    ai_analysis: true

  standalone:
    platforms: ["cls-hot"]
    rss_feeds: []
    max_items: 0


# ===============================================================
# 6. 推送通知 — Bark
# ===============================================================
notification:
  enabled: true

  channels:
    bark:
      url: ""

    # 以下未启用
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 7

  remote:
    retention_days: 7
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 180
  temperature: 0.3
  max_tokens: 8000
  num_retries: 2
  fallback_models: []


# ===============================================================
# 9. AI 分析功能 — 金融晨报专用
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "../custom/ai/morning_report_prompt.txt"

  mode: "daily"
  max_news_for_analysis: 200
  include_rss: true
  include_standalone: true
  include_rank_timeline: false


# ===============================================================
# 10. AI 翻译 — 关闭（中文输出不需要）
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: false
    standalone: false


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 30
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
